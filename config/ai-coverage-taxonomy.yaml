coverage_policy:
  minimum_source_families_per_leaf: 2
  required_entity_types: [concept, method, task]
  recommended_entity_types: [model, architecture, dataset, metric, loss, resource]
  metrics:
    - core_entity_coverage
    - typed_claim_density
    - multi_source_evidence_rate
    - orphan_rate
    - unresolved_conflict_rate
    - source_diversity
    - freshness
